services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql

  parts-service:
    build: ./parts-service
    restart: unless-stopped
    ports:
      - "4001:4001"
      - "50051:50051"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/catalog_db
      PORT: 4001
      GRPC_PORT: 50051
    depends_on:
      - postgres

  builds-service:
    build: ./builds-service
    restart: unless-stopped
    ports:
      - "4002:4002"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/builds_db
      PORT: 4002
      JWT_SECRET: ${JWT_SECRET}
      PARTS_GRPC_HOST: parts-service:50051
      PARTS_PROTO_PATH: /proto/parts.proto
    volumes:
      - ./parts-service/proto:/proto:ro
    depends_on:
      - postgres
      - parts-service

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  users-service:
    build: ./users-service
    restart: unless-stopped
    ports:
      - "4003:4003"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/users_db
      PORT: 4003
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  grpcox:
    image: gusaul/grpcox:latest
    restart: unless-stopped
    ports:
      - "6969:6969"

volumes:
  pgdata:
